<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>{{ property_name }} — Procurement</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/animations.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/mobile_responsive.css">
  <style>
    *, *::before, *::after { font-family: 'Inter', system-ui, sans-serif; box-sizing: border-box; }
    :root {
      --brand: #125435; --brand-mid: #1a7a4c; --brand-light: #10b981;
      --brand-pale: #f0fdf4; --bg: #f4f6f5;
      --text: #0f172a; --muted: #64748b; --border: #e2e8f0;
      --prop-color: #4f46e5;
    }
    body { background: var(--bg); min-height: 100vh; }

    /* ── Banner ── */
    .page-banner {
      background: linear-gradient(135deg, #312e81, #4f46e5 60%, #6366f1);
      padding: 2.5rem 2.5rem 1.5rem; position: relative; overflow: hidden;
    }
    .page-banner::before {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .page-banner::after {
      content: ''; position: absolute; right: -5%; top: -30%;
      width: 40%; height: 160%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    }
    .banner-inner { position: relative; z-index: 1; }
    .back-link { display: inline-flex; align-items: center; gap:.4rem; color: rgba(255,255,255,.65); text-decoration:none; font-size:.82rem; font-weight:500; margin-bottom:.8rem; transition: color .2s; }
    .back-link:hover { color: #fff; }
    .banner-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
    .banner-identity { display:flex; align-items:center; gap:1.25rem; }
    .prop-avatar {
      width: 64px; height: 64px; border-radius: 16px;
      background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.28);
      display: flex; align-items: center; justify-content: center; font-size: 1.75rem;
    }
    .banner-title { font-size: 1.7rem; font-weight: 800; color: #fff; margin: 0; }
    .banner-sub   { font-size: .85rem; color: rgba(255,255,255,.65); margin: .2rem 0 0; }
    .banner-actions { display:flex; gap:.65rem; flex-wrap:wrap; }
    .btn-export-prop {
      display: inline-flex; align-items: center; gap:.4rem;
      background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.25);
      padding: .6rem 1.1rem; border-radius: 10px; font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }
    .btn-export-prop:hover { background: rgba(255,255,255,.22); }
    .btn-add-mat-prop {
      display: inline-flex; align-items: center; gap:.4rem;
      background: #fff; color: #4f46e5; border: none;
      padding: .6rem 1.25rem; border-radius: 10px; font-size: .82rem; font-weight: 700;
      cursor: pointer; transition: all .2s; box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    .btn-add-mat-prop:hover { background: #ede9fe; transform: translateY(-1px); }
    .btn-add-mat-prop svg, .btn-export-prop svg { width: 14px; height: 14px; }
    .btn-export-prop svg { stroke: white; }
    .btn-add-mat-prop svg { stroke: #4f46e5; }

    /* ── KPI Strip ── */
    .kpi-strip {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1rem; max-width: 1400px; margin: -2rem auto 0;
      padding: 0 2rem; position: relative; z-index: 10;
    }
    @media (max-width: 900px) { .kpi-strip { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 480px) { .kpi-strip { grid-template-columns: 1fr; } }
    .kpi-box {
      background: #fff; border-radius: 14px; padding: 1.25rem 1.5rem;
      border: 1px solid var(--border); box-shadow: 0 6px 24px rgba(0,0,0,.08);
      display: flex; align-items: center; gap: .9rem;
    }
    .kpi-box-icon {
      width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .kpi-box-icon svg { width: 18px; height: 18px; }
    .kpi-box-lbl { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
    .kpi-box-val { font-size: 1.55rem; font-weight: 800; line-height: 1.1; }
    .kpi-blue   .kpi-box-icon { background: #eff6ff; } .kpi-blue   .kpi-box-icon svg { stroke: #2563eb; } .kpi-blue   .kpi-box-val { color: #2563eb; }
    .kpi-green  .kpi-box-icon { background: #f0fdf4; } .kpi-green  .kpi-box-icon svg { stroke: #059669; } .kpi-green  .kpi-box-val { color: #059669; }
    .kpi-amber  .kpi-box-icon { background: #fffbeb; } .kpi-amber  .kpi-box-icon svg { stroke: #d97706; } .kpi-amber  .kpi-box-val { color: #d97706; }
    .kpi-purple .kpi-box-icon { background: #f5f3ff; } .kpi-purple .kpi-box-icon svg { stroke: #7c3aed; } .kpi-purple .kpi-box-val { color: #7c3aed; }
    .kpi-purple .kpi-box-icon-aed .kpi-currency-aed {
      font-size: 0.62rem; font-weight: 800; letter-spacing: 0.05em; color: #7c3aed; line-height: 1;
    }

    /* ── Main content ── */
    .main-content { max-width: 1400px; margin: 2.5rem auto; padding: 0 2rem; }

    /* ── Toolbar ── */
    .toolbar {
      background: #fff; border: 1px solid var(--border); border-radius: 14px;
      padding: 1rem 1.25rem; display: flex; align-items: center; gap: .75rem;
      flex-wrap: wrap; margin-bottom: 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 360px; }
    .search-wrap svg {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; stroke: #94a3b8; fill: none; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round; pointer-events: none;
    }
    .search-input {
      width: 100%; padding: .58rem .85rem .58rem 2.1rem;
      border: 1.5px solid var(--border); border-radius: 9px; font-size: .85rem;
      outline: none; transition: border-color .15s; background: #f8fafc;
    }
    .search-input:focus { border-color: #6366f1; background: #fff; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    .toolbar-count { margin-left: auto; font-size: .78rem; font-weight: 600; color: var(--muted); background: #f1f5f9; border-radius: 20px; padding: .28rem .85rem; white-space: nowrap; }

    /* ── Table ── */
    .table-card { background: #fff; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.05); }
    .mat-table { width: 100%; border-collapse: collapse; }
    .mat-table thead th {
      background: #f8fafc; padding: .85rem 1.1rem;
      font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #64748b;
      border-bottom: 1.5px solid var(--border); white-space: nowrap;
    }
    .mat-table tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .15s; }
    .mat-table tbody tr:last-child { border-bottom: none; }
    .mat-table tbody tr:hover { background: #f8fafc; }
    .mat-table td { padding: .9rem 1.1rem; font-size: .875rem; color: var(--text); vertical-align: middle; }
    .mat-name { font-weight: 600; color: var(--text); }
    .mat-desc { font-size: .75rem; color: var(--muted); margin-top: .12rem; }
    .cat-badge { display: inline-flex; align-items: center; gap: .3rem; padding: .22rem .6rem; border-radius: 20px; font-size: .71rem; font-weight: 700; }
    .cat-badge .dot { width: 5px; height: 5px; border-radius: 50%; }
    .cat-general    { background: #e0e7ff; color: #4338ca; } .cat-general .dot    { background: #4338ca; }
    .cat-electrical { background: #fef3c7; color: #b45309; } .cat-electrical .dot { background: #d97706; }
    .cat-plumbing   { background: #dbeafe; color: #1d4ed8; } .cat-plumbing .dot   { background: #3b82f6; }
    .cat-hvac       { background: #d1fae5; color: #047857; } .cat-hvac .dot       { background: #10b981; }
    .cat-cleaning   { background: #fce7f3; color: #be185d; } .cat-cleaning .dot   { background: #ec4899; }
    .sub-val  { color: var(--muted); font-size: .82rem; }
    .bold-val { font-weight: 700; color: var(--text); }
    .btn-rm {
      display: inline-flex; align-items: center; gap: .3rem;
      background: #fff0f0; color: #dc2626; border: 1px solid #fecaca;
      padding: .32rem .7rem; border-radius: 7px; font-size: .75rem; font-weight: 600; cursor: pointer;
      transition: all .18s;
    }
    .btn-rm:hover { background: #fee2e2; border-color: #fca5a5; }
    .btn-rm svg { width: 11px; height: 11px; stroke: #dc2626; }
    .empty-row td { text-align: center; padding: 3.5rem 1rem; color: var(--muted); }

    /* ── Modal ── */
    .proc-modal .modal-content { border-radius: 20px; border: none; overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,.14); }
    .proc-modal .modal-header { background: linear-gradient(135deg,#4f46e5,#4338ca); color: white; border: none; padding: 1.5rem 2rem; }
    .proc-modal .modal-body   { padding: 1.75rem 2rem; }
    .proc-modal .modal-footer { border: none; padding: 0 2rem 1.75rem; }
    .proc-modal .form-control, .proc-modal .form-select { border-radius: 10px; padding: .68rem 1rem; border-color: #d1d5db; }
    .proc-modal .form-control:focus, .proc-modal .form-select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
    .proc-modal .form-label { font-weight: 600; font-size: .85rem; color: #374151; }
  </style>
</head>
<body>

  <!-- Banner -->
  <div class="page-banner">
    <div class="banner-inner">
      <a href="/procurement/properties" class="back-link">
        <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Back to Properties
      </a>
      <div class="banner-row">
        <div class="banner-identity">
          <div class="prop-avatar">🏢</div>
          <div>
            <div class="banner-title">{{ property_name }}</div>
            <div class="banner-sub">Materials inventory for this property</div>
          </div>
        </div>
        <div class="banner-actions">
          <button class="btn-export-prop" onclick="exportPropertyExcel()">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Export Excel
          </button>
          <button class="btn-add-mat-prop" onclick="showAddMaterialModal()">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
            Add Material
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- KPI Strip -->
  <div class="kpi-strip">
    <div class="kpi-box kpi-blue">
      <div class="kpi-box-icon"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z"/></svg></div>
      <div><div class="kpi-box-lbl">Materials</div><div class="kpi-box-val" id="totalMaterials">—</div></div>
    </div>
    <div class="kpi-box kpi-green">
      <div class="kpi-box-icon"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 0 0 6 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0 1 18 16.5h-2.25m-7.5 0h7.5m-7.5 0-1 3m8.5-3 1 3m0 0 .5 1.5m-.5-1.5h-9.5m0 0-.5 1.5"/></svg></div>
      <div><div class="kpi-box-lbl">Total Items</div><div class="kpi-box-val" id="totalItems">—</div></div>
    </div>
    <div class="kpi-box kpi-amber">
      <div class="kpi-box-icon"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 0 0 3 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 0 0 5.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 0 0 9.568 3Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6Z"/></svg></div>
      <div><div class="kpi-box-lbl">Categories</div><div class="kpi-box-val" id="categories">—</div></div>
    </div>
    <div class="kpi-box kpi-purple">
      <div class="kpi-box-icon kpi-box-icon-aed" aria-hidden="true"><span class="kpi-currency-aed">AED</span></div>
      <div><div class="kpi-box-lbl">Value (AED)</div><div class="kpi-box-val" id="totalValue">—</div></div>
    </div>
  </div>

  <!-- Materials Table -->
  <div class="main-content">
    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search materials…" oninput="filterMaterials()">
      </div>
      <div class="toolbar-count" id="countBadge">Loading…</div>
    </div>

    <div class="table-card">
      <div class="table-responsive">
        <table class="mat-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Material</th>
              <th>Category</th>
              <th>Qty</th>
              <th>Unit Price</th>
              <th>Total Value</th>
              <th>Supplier</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="materialsBody">
            <tr class="empty-row"><td colspan="8"><div class="d-flex justify-content-center align-items-center gap-2"><div class="spinner-border spinner-border-sm text-secondary"></div><span>Loading…</span></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Add Material Modal -->
  <div class="modal fade proc-modal" id="addMaterialModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" style="font-weight:700;font-size:1.05rem;">Add Material to {{ property_name }}</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label">Material Name *</label>
              <input type="text" class="form-control" id="materialName" required placeholder="e.g., PVC Pipe 4 inch">
            </div>
            <div class="col-md-4">
              <label class="form-label">Category</label>
              <select class="form-select" id="materialCategory">
                <option value="General">General</option>
                <option value="Electrical">Electrical</option>
                <option value="Plumbing">Plumbing</option>
                <option value="HVAC/MEP">HVAC / MEP</option>
                <option value="Cleaning">Cleaning</option>
                <option value="Safety">Safety</option>
                <option value="Tools">Tools</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Quantity *</label>
              <input type="number" class="form-control" id="materialQty" value="1" min="0" step="0.01">
            </div>
            <div class="col-md-4">
              <label class="form-label">Unit</label>
              <select class="form-select" id="materialUnit">
                <option value="pcs">Pieces (pcs)</option>
                <option value="kg">Kilograms (kg)</option>
                <option value="m">Meters (m)</option>
                <option value="sqm">Square Meters</option>
                <option value="ltr">Liters</option>
                <option value="box">Box</option>
                <option value="set">Set</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Unit Price (AED)</label>
              <input type="number" class="form-control" id="materialPrice" value="0" min="0" step="0.01">
            </div>
            <div class="col-12">
              <label class="form-label">Supplier</label>
              <input type="text" class="form-control" id="materialSupplier" placeholder="Supplier / vendor name">
            </div>
            <div class="col-12">
              <label class="form-label">Notes</label>
              <textarea class="form-control" id="materialNotes" rows="2" placeholder="Additional notes…"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal" style="border-radius:10px;font-weight:600;">Cancel</button>
          <button type="button" class="btn" style="background:linear-gradient(135deg,#4f46e5,#4338ca);color:white;border-radius:10px;font-weight:600;padding:.6rem 1.5rem;" onclick="addMaterial()">Add Material</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = localStorage.getItem('access_token');
    const propertyName = '{{ property_name }}';
    let allMaterials = [];

    function getCatClass(cat) {
      const c = (cat || '').toLowerCase();
      if (c.includes('electrical')) return 'cat-electrical';
      if (c.includes('plumbing'))   return 'cat-plumbing';
      if (c.includes('hvac') || c.includes('mep')) return 'cat-hvac';
      if (c.includes('cleaning'))   return 'cat-cleaning';
      return 'cat-general';
    }

    async function loadMaterials() {
      try {
        const response = await fetch(`/procurement/api/property-materials/${encodeURIComponent(propertyName)}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        if (data.materials) {
          allMaterials = data.materials;
          renderMaterials(allMaterials);
          let totalQty = 0, totalValue = 0;
          const categories = new Set();
          data.materials.forEach(m => {
            totalQty += parseFloat(m.quantity) || 0;
            totalValue += parseFloat(m.total_price) || 0;
            if (m.category) categories.add(m.category);
          });
          document.getElementById('totalMaterials').textContent = data.materials.length;
          document.getElementById('totalItems').textContent     = totalQty.toLocaleString();
          document.getElementById('categories').textContent     = categories.size;
          document.getElementById('totalValue').textContent     = totalValue.toLocaleString('en-AE', { maximumFractionDigits: 0 });
        }
      } catch (error) {
        document.getElementById('materialsBody').innerHTML = '<tr class="empty-row"><td colspan="8" class="text-danger">Error loading materials</td></tr>';
      }
    }

    function renderMaterials(materials) {
      const tbody = document.getElementById('materialsBody');
      document.getElementById('countBadge').textContent = materials.length + ' material' + (materials.length !== 1 ? 's' : '');
      if (materials.length === 0) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="8">
          <div style="font-size:2.5rem;margin-bottom:.75rem;">📦</div>
          <div style="font-weight:600;margin-bottom:.3rem;">No materials yet</div>
          <div style="font-size:.82rem;margin-bottom:1rem;">Add materials to this property</div>
          <button onclick="showAddMaterialModal()" style="background:linear-gradient(135deg,#4f46e5,#4338ca);color:white;border:none;border-radius:9px;padding:.55rem 1.25rem;font-weight:600;cursor:pointer;font-size:.82rem;">+ Add First Material</button>
        </td></tr>`;
        return;
      }
      tbody.innerHTML = materials.map((m, i) => `
        <tr>
          <td style="color:#94a3b8;font-size:.78rem;font-weight:600;">${i+1}</td>
          <td>
            <div class="mat-name">${esc(m.material_name)}</div>
            ${m.description ? `<div class="mat-desc">${esc(m.description)}</div>` : ''}
          </td>
          <td><span class="cat-badge ${getCatClass(m.category)}"><span class="dot"></span>${esc(m.category || 'General')}</span></td>
          <td class="sub-val">${m.quantity} <span style="color:#94a3b8">${m.unit}</span></td>
          <td class="sub-val">AED ${parseFloat(m.unit_price).toFixed(2)}</td>
          <td class="bold-val">AED ${parseFloat(m.total_price).toFixed(2)}</td>
          <td class="sub-val">${esc(m.supplier || '—')}</td>
          <td>
            <button class="btn-rm" onclick="removeMaterial('${m.id}')">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
              Remove
            </button>
          </td>
        </tr>`).join('');
    }

    function filterMaterials() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allMaterials.filter(m =>
        (m.material_name || '').toLowerCase().includes(q) ||
        (m.category || '').toLowerCase().includes(q) ||
        (m.supplier || '').toLowerCase().includes(q)
      );
      renderMaterials(filtered);
    }

    function showAddMaterialModal() {
      new bootstrap.Modal(document.getElementById('addMaterialModal')).show();
    }

    async function addMaterial() {
      const name = document.getElementById('materialName').value.trim();
      if (!name) { alert('Material name is required'); return; }
      const data = {
        material_name: name,
        property: propertyName,
        category:  document.getElementById('materialCategory').value,
        quantity:  document.getElementById('materialQty').value,
        unit:      document.getElementById('materialUnit').value,
        unit_price:document.getElementById('materialPrice').value,
        supplier:  document.getElementById('materialSupplier').value,
        notes:     document.getElementById('materialNotes').value
      };
      try {
        const response = await fetch('/procurement/api/materials', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(data)
        });
        const result = await response.json();
        if (result.success) {
          bootstrap.Modal.getInstance(document.getElementById('addMaterialModal')).hide();
          document.getElementById('materialName').value     = '';
          document.getElementById('materialSupplier').value = '';
          document.getElementById('materialNotes').value    = '';
          document.getElementById('materialQty').value      = '1';
          document.getElementById('materialPrice').value    = '0';
          loadMaterials();
        } else { alert('Error: ' + result.error); }
      } catch (error) { alert('Error: ' + error.message); }
    }

    async function removeMaterial(id) {
      if (!confirm('Remove this material from the property?')) return;
      try {
        const response = await fetch(`/procurement/api/materials/${id}`, {
          method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
        });
        const result = await response.json();
        if (result.success) loadMaterials();
        else alert('Error: ' + result.error);
      } catch (error) { alert('Error: ' + error.message); }
    }

    function exportPropertyExcel() {
      window.open(`/procurement/api/export-excel?property=${encodeURIComponent(propertyName)}`, '_blank');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = String(s || '');
      return d.innerHTML;
    }

    loadMaterials();
  </script>
</body>
</html>
