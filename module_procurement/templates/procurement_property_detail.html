<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ property_name }} - Procurement</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/mobile_responsive.css">
  <style>
    :root { --primary: #125435; --purple: #6366f1; --purple-dark: #4f46e5; }
    body { background: #f1f5f9; min-height: 100vh; }
    
    .page-header {
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
      color: white;
      padding: 2rem;
      border-radius: 20px;
      margin-bottom: 2rem;
    }
    
    .back-link {
      color: white;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      opacity: 0.9;
    }
    .back-link:hover { color: white; opacity: 1; }
    
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
    
    .stat-box {
      background: white;
      border-radius: 12px;
      padding: 1.25rem;
      text-align: center;
      border: 1px solid #e2e8f0;
    }
    .stat-box h4 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .stat-box p {
      color: #64748b;
      font-size: 0.8rem;
      margin: 0;
    }
    .stat-blue h4 { color: #3b82f6; }
    .stat-green h4 { color: #10b981; }
    .stat-orange h4 { color: #f59e0b; }
    .stat-purple h4 { color: #8b5cf6; }
    
    .materials-table {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    
    .table-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .search-box {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      width: 250px;
    }
    
    .btn-add {
      background: linear-gradient(135deg, var(--purple), var(--purple-dark));
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 500;
    }
    .btn-add:hover { color: white; }
    
    .btn-export {
      background: #10b981;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 500;
    }
    .btn-export:hover { color: white; background: #047857; }
    
    .table th {
      background: #f8fafc;
      font-weight: 600;
      color: #475569;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .table td {
      vertical-align: middle;
    }
    
    .category-badge {
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .cat-general { background: #e0e7ff; color: #4338ca; }
    .cat-electrical { background: #fef3c7; color: #b45309; }
    .cat-plumbing { background: #dbeafe; color: #1d4ed8; }
    .cat-hvac { background: #d1fae5; color: #047857; }
    
    .btn-remove {
      background: #fee2e2;
      color: #dc2626;
      border: none;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    .btn-remove:hover { background: #fecaca; }
    
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="page-header">
      <a href="/procurement/properties" class="back-link">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Back to Properties
      </a>
      <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem;">
        🏢 {{ property_name }}
      </h1>
      <p style="opacity: 0.9; margin: 0;">
        Materials inventory for this property
      </p>
    </div>
    
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box stat-blue">
        <h4 id="totalMaterials">-</h4>
        <p>Materials</p>
      </div>
      <div class="stat-box stat-green">
        <h4 id="totalItems">-</h4>
        <p>Total Items</p>
      </div>
      <div class="stat-box stat-orange">
        <h4 id="categories">-</h4>
        <p>Categories</p>
      </div>
      <div class="stat-box stat-purple">
        <h4 id="totalValue">-</h4>
        <p>Value (AED)</p>
      </div>
    </div>
    
    <!-- Materials Table -->
    <div class="materials-table">
      <div class="table-header">
        <div>
          <h5 style="font-weight: 600; margin: 0;">Materials List</h5>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <input type="text" class="search-box" id="searchInput" placeholder="Search materials..." oninput="filterMaterials()">
          <button class="btn-export" onclick="exportPropertyExcel()">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right: 4px;">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            Export
          </button>
          <button class="btn-add" onclick="showAddMaterialModal()">+ Add Material</button>
        </div>
      </div>
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th style="padding: 1rem;">Material</th>
              <th style="padding: 1rem;">Category</th>
              <th style="padding: 1rem;">Qty</th>
              <th style="padding: 1rem;">Unit Price</th>
              <th style="padding: 1rem;">Total</th>
              <th style="padding: 1rem;">Supplier</th>
              <th style="padding: 1rem;">Actions</th>
            </tr>
          </thead>
          <tbody id="materialsBody">
            <tr><td colspan="7" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  
  <!-- Add Material Modal -->
  <div class="modal fade" id="addMaterialModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content" style="border-radius: 16px;">
        <div class="modal-header" style="background: linear-gradient(135deg, var(--purple), var(--purple-dark)); color: white; border: none; border-radius: 16px 16px 0 0;">
          <h5 class="modal-title" style="font-weight: 600;">Add Material to {{ property_name }}</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label" style="font-weight: 600;">Material Name *</label>
              <input type="text" class="form-control" id="materialName" required>
            </div>
            <div class="col-md-4">
              <label class="form-label" style="font-weight: 600;">Category</label>
              <select class="form-select" id="materialCategory">
                <option value="General">General</option>
                <option value="Electrical">Electrical</option>
                <option value="Plumbing">Plumbing</option>
                <option value="HVAC/MEP">HVAC/MEP</option>
                <option value="Cleaning">Cleaning</option>
                <option value="Safety">Safety</option>
                <option value="Tools">Tools</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label" style="font-weight: 600;">Quantity *</label>
              <input type="number" class="form-control" id="materialQty" value="1" min="0" step="0.01">
            </div>
            <div class="col-md-4">
              <label class="form-label" style="font-weight: 600;">Unit</label>
              <select class="form-select" id="materialUnit">
                <option value="pcs">Pieces (pcs)</option>
                <option value="kg">Kilograms (kg)</option>
                <option value="m">Meters (m)</option>
                <option value="sqm">Square Meters</option>
                <option value="ltr">Liters</option>
                <option value="box">Box</option>
                <option value="set">Set</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label" style="font-weight: 600;">Unit Price (AED)</label>
              <input type="number" class="form-control" id="materialPrice" value="0" min="0" step="0.01">
            </div>
            <div class="col-12">
              <label class="form-label" style="font-weight: 600;">Supplier</label>
              <input type="text" class="form-control" id="materialSupplier">
            </div>
            <div class="col-12">
              <label class="form-label" style="font-weight: 600;">Notes</label>
              <textarea class="form-control" id="materialNotes" rows="2"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer" style="border: none;">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn-add" onclick="addMaterial()">Add Material</button>
        </div>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = localStorage.getItem('access_token');
    const propertyName = '{{ property_name }}';
    let allMaterials = [];
    
    function getCategoryClass(cat) {
      const c = (cat || '').toLowerCase();
      if (c.includes('electrical')) return 'cat-electrical';
      if (c.includes('plumbing')) return 'cat-plumbing';
      if (c.includes('hvac') || c.includes('mep')) return 'cat-hvac';
      return 'cat-general';
    }
    
    async function loadMaterials() {
      try {
        const response = await fetch(`/procurement/api/property-materials/${encodeURIComponent(propertyName)}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        
        if (data.materials) {
          allMaterials = data.materials;
          renderMaterials(allMaterials);
          
          // Update stats
          document.getElementById('totalMaterials').textContent = data.materials.length;
          
          let totalQty = 0, totalValue = 0;
          const categories = new Set();
          
          data.materials.forEach(m => {
            totalQty += parseFloat(m.quantity) || 0;
            totalValue += parseFloat(m.total_price) || 0;
            if (m.category) categories.add(m.category);
          });
          
          document.getElementById('totalItems').textContent = totalQty.toLocaleString();
          document.getElementById('categories').textContent = categories.size;
          document.getElementById('totalValue').textContent = totalValue.toLocaleString('en-AE', { maximumFractionDigits: 0 });
        }
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('materialsBody').innerHTML = '<tr><td colspan="7" class="text-center py-5 text-danger">Error loading materials</td></tr>';
      }
    }
    
    function renderMaterials(materials) {
      const tbody = document.getElementById('materialsBody');
      
      if (materials.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="empty-state">
              <div style="font-size: 3rem; margin-bottom: 1rem;">📦</div>
              <h5>No materials yet</h5>
              <p class="text-muted">Add materials to this property</p>
              <button class="btn-add mt-2" onclick="showAddMaterialModal()">+ Add First Material</button>
            </td>
          </tr>
        `;
        return;
      }
      
      tbody.innerHTML = materials.map(m => `
        <tr>
          <td style="padding: 1rem;">
            <strong>${m.material_name}</strong>
            ${m.description ? `<br><small class="text-muted">${m.description}</small>` : ''}
          </td>
          <td style="padding: 1rem;">
            <span class="category-badge ${getCategoryClass(m.category)}">${m.category}</span>
          </td>
          <td style="padding: 1rem;">${m.quantity} ${m.unit}</td>
          <td style="padding: 1rem;">AED ${parseFloat(m.unit_price).toFixed(2)}</td>
          <td style="padding: 1rem;"><strong>AED ${parseFloat(m.total_price).toFixed(2)}</strong></td>
          <td style="padding: 1rem;">${m.supplier || '-'}</td>
          <td style="padding: 1rem;">
            <button class="btn-remove" onclick="removeMaterial('${m.id}')">Remove</button>
          </td>
        </tr>
      `).join('');
    }
    
    function filterMaterials() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allMaterials.filter(m => 
        m.material_name.toLowerCase().includes(search) ||
        (m.category || '').toLowerCase().includes(search) ||
        (m.supplier || '').toLowerCase().includes(search)
      );
      renderMaterials(filtered);
    }
    
    function showAddMaterialModal() {
      const modal = new bootstrap.Modal(document.getElementById('addMaterialModal'));
      modal.show();
    }
    
    async function addMaterial() {
      const name = document.getElementById('materialName').value.trim();
      if (!name) {
        alert('Material name is required');
        return;
      }
      
      const data = {
        material_name: name,
        property: propertyName,
        category: document.getElementById('materialCategory').value,
        quantity: document.getElementById('materialQty').value,
        unit: document.getElementById('materialUnit').value,
        unit_price: document.getElementById('materialPrice').value,
        supplier: document.getElementById('materialSupplier').value,
        notes: document.getElementById('materialNotes').value
      };
      
      try {
        const response = await fetch('/procurement/api/materials', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(data)
        });
        
        const result = await response.json();
        if (result.success) {
          alert('Material added successfully!');
          bootstrap.Modal.getInstance(document.getElementById('addMaterialModal')).hide();
          
          // Clear form
          document.getElementById('materialName').value = '';
          document.getElementById('materialSupplier').value = '';
          document.getElementById('materialNotes').value = '';
          document.getElementById('materialQty').value = '1';
          document.getElementById('materialPrice').value = '0';
          
          loadMaterials();
        } else {
          alert('Error: ' + result.error);
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }
    
    async function removeMaterial(id) {
      if (!confirm('Remove this material from the property?')) return;
      
      try {
        const response = await fetch(`/procurement/api/materials/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const result = await response.json();
        if (result.success) {
          loadMaterials();
        } else {
          alert('Error: ' + result.error);
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }
    
    function exportPropertyExcel() {
      window.open(`/procurement/api/export-excel?property=${encodeURIComponent(propertyName)}`, '_blank');
    }
    
    loadMaterials();
  </script>
</body>
</html>
