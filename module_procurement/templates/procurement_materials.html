<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Materials List - Procurement Module</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/mobile_responsive.css">
  <style>
    :root { --primary: #125435; --purple: #7c3aed; }
    body { background: #f1f5f9; }
    .page-header { background: white; padding: 1.5rem; border-radius: 16px; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .back-link { color: var(--primary); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
    .search-box { border: 1px solid #d1d5db; border-radius: 8px; padding: 0.75rem 1rem; width: 100%; max-width: 300px; }
    .btn-add { background: linear-gradient(135deg, var(--purple), #5b21b6); color: white; border: none; padding: 0.625rem 1.25rem; border-radius: 8px; font-weight: 500; text-decoration: none; }
    .btn-add:hover { color: white; }
    .materials-table { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .table th { background: #f8fafc; font-weight: 600; color: #374151; border-bottom: 2px solid #e5e7eb; }
    .table td { vertical-align: middle; }
    .btn-delete { background: #fee2e2; color: #dc2626; border: none; padding: 0.375rem 0.75rem; border-radius: 6px; font-size: 0.875rem; }
    .btn-delete:hover { background: #fecaca; }
    .category-badge { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 500; }
    .cat-general { background: #e0e7ff; color: #4338ca; }
    .cat-electrical { background: #fef3c7; color: #b45309; }
    .cat-plumbing { background: #dbeafe; color: #1d4ed8; }
    .cat-hvac { background: #d1fae5; color: #047857; }
    .cat-cleaning { background: #fce7f3; color: #be185d; }
    .cat-imported { background: #f3e8ff; color: #7c3aed; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="page-header">
      <a href="/procurement/" class="back-link">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Back to Procurement
      </a>
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
          <h1 style="font-size: 1.75rem; font-weight: 700; margin: 0;">Materials List</h1>
          <p class="text-muted mb-0">Manage all procurement materials</p>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <input type="text" class="search-box" id="searchInput" placeholder="Search materials..." oninput="filterMaterials()">
          <a href="/procurement/add-material" class="btn-add">+ Add Material</a>
        </div>
      </div>
    </div>
    
    <div class="materials-table">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th style="padding: 1rem;">Material</th>
              <th style="padding: 1rem;">Property</th>
              <th style="padding: 1rem;">Category</th>
              <th style="padding: 1rem;">Quantity</th>
              <th style="padding: 1rem;">Unit Price</th>
              <th style="padding: 1rem;">Total</th>
              <th style="padding: 1rem;">Actions</th>
            </tr>
          </thead>
          <tbody id="materialsBody">
            <tr><td colspan="8" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
    
    <div id="pagination" class="d-flex justify-content-between align-items-center mt-3 px-2">
      <span id="showingText" class="text-muted"></span>
      <div id="pageButtons"></div>
    </div>
  </div>
  
  <script>
    const token = localStorage.getItem('access_token');
    let allMaterials = [];
    let filteredMaterials = [];
    const perPage = 20;
    let currentPage = 1;
    
    function getCategoryClass(cat) {
      const lower = (cat || '').toLowerCase();
      if (lower.includes('electrical')) return 'cat-electrical';
      if (lower.includes('plumbing')) return 'cat-plumbing';
      if (lower.includes('hvac') || lower.includes('mep')) return 'cat-hvac';
      if (lower.includes('cleaning')) return 'cat-cleaning';
      if (lower.includes('imported')) return 'cat-imported';
      return 'cat-general';
    }
    
    async function loadMaterials() {
      try {
        const response = await fetch('/procurement/api/materials', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        
        if (data.materials) {
          allMaterials = data.materials;
          filteredMaterials = [...allMaterials];
          renderTable();
        }
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('materialsBody').innerHTML = '<tr><td colspan="8" class="text-center py-5 text-danger">Error loading materials</td></tr>';
      }
    }
    
    function filterMaterials() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      filteredMaterials = allMaterials.filter(m => 
        m.material_name.toLowerCase().includes(search) ||
        (m.category || '').toLowerCase().includes(search) ||
        (m.property || '').toLowerCase().includes(search) ||
        (m.supplier || '').toLowerCase().includes(search)
      );
      currentPage = 1;
      renderTable();
    }
    
    function renderTable() {
      const start = (currentPage - 1) * perPage;
      const end = start + perPage;
      const pageData = filteredMaterials.slice(start, end);
      
      const tbody = document.getElementById('materialsBody');
      
      if (pageData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-5 text-muted">No materials found</td></tr>';
      } else {
        tbody.innerHTML = pageData.map(m => `
          <tr>
            <td style="padding: 1rem;">
              <strong>${m.material_name}</strong>
              ${m.description ? `<br><small class="text-muted">${m.description}</small>` : ''}
            </td>
            <td style="padding: 1rem;">
              <span class="badge ${m.property && m.property !== 'Unassigned' ? 'bg-primary' : 'bg-secondary'}" style="font-weight: 500;">
                ${m.property || 'Unassigned'}
              </span>
            </td>
            <td style="padding: 1rem;"><span class="category-badge ${getCategoryClass(m.category)}">${m.category}</span></td>
            <td style="padding: 1rem;">${m.quantity} ${m.unit}</td>
            <td style="padding: 1rem;">AED ${parseFloat(m.unit_price).toFixed(2)}</td>
            <td style="padding: 1rem;"><strong>AED ${parseFloat(m.total_price).toFixed(2)}</strong></td>
            <td style="padding: 1rem;">
              <button class="btn-delete" onclick="deleteMaterial('${m.id}')">Delete</button>
            </td>
          </tr>
        `).join('');
      }
      
      // Update pagination info
      document.getElementById('showingText').textContent = `Showing ${start + 1}-${Math.min(end, filteredMaterials.length)} of ${filteredMaterials.length}`;
      
      // Render page buttons
      const totalPages = Math.ceil(filteredMaterials.length / perPage);
      const pageButtons = document.getElementById('pageButtons');
      if (totalPages > 1) {
        let btns = '';
        for (let i = 1; i <= totalPages; i++) {
          btns += `<button class="btn btn-sm ${i === currentPage ? 'btn-primary' : 'btn-outline-secondary'} mx-1" onclick="goToPage(${i})">${i}</button>`;
        }
        pageButtons.innerHTML = btns;
      } else {
        pageButtons.innerHTML = '';
      }
    }
    
    function goToPage(page) {
      currentPage = page;
      renderTable();
    }
    
    async function deleteMaterial(id) {
      if (!confirm('Are you sure you want to delete this material?')) return;
      
      try {
        const response = await fetch(`/procurement/api/materials/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const result = await response.json();
        if (result.success) {
          loadMaterials();
        } else {
          alert('Error: ' + result.error);
        }
      } catch (error) {
        alert('Error deleting material: ' + error.message);
      }
    }
    
    loadMaterials();
  </script>
</body>
</html>
