<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property-wise Materials - Procurement</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/mobile_responsive.css">
  <style>
    :root { --primary: #125435; --green: #10b981; --green-dark: #047857; }
    body { background: #f1f5f9; min-height: 100vh; }
    
    .page-header {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
      color: white;
      padding: 2rem;
      border-radius: 20px;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 50%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    }
    
    .back-link {
      color: white;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      opacity: 0.9;
    }
    .back-link:hover { color: white; opacity: 1; }
    
    .properties-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    
    .property-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: all 0.3s;
      border: 1px solid #e2e8f0;
      text-decoration: none;
      display: block;
    }
    .property-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }
    
    .property-header {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      padding: 1.5rem;
      position: relative;
    }
    .property-header.unassigned {
      background: linear-gradient(135deg, #94a3b8, #64748b);
    }
    
    .property-icon {
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
    }
    
    .property-name {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0;
    }
    
    .property-body {
      padding: 1.5rem;
    }
    
    .property-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      text-align: center;
    }
    
    .property-stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
    }
    .property-stat-label {
      font-size: 0.7rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .property-footer {
      padding: 1rem 1.5rem;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .btn-view {
      background: var(--green);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-view:hover { background: var(--green-dark); color: white; }
    
    .add-property-card {
      background: white;
      border: 2px dashed #cbd5e1;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      cursor: pointer;
      transition: all 0.3s;
      min-height: 280px;
    }
    .add-property-card:hover {
      border-color: var(--green);
      background: #f0fdf4;
    }
    .add-property-card svg {
      width: 48px;
      height: 48px;
      color: #94a3b8;
      margin-bottom: 1rem;
    }
    .add-property-card:hover svg {
      color: var(--green);
    }
    .add-property-card h5 {
      color: #64748b;
      font-weight: 600;
      margin: 0;
    }
    .add-property-card:hover h5 {
      color: var(--green-dark);
    }
    
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      background: white;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
    }
    .empty-state svg {
      width: 80px;
      height: 80px;
      color: #cbd5e1;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="page-header">
      <a href="/procurement/" class="back-link">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Back to Procurement
      </a>
      <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; position: relative;">
        Property-wise Materials
      </h1>
      <p style="opacity: 0.9; margin: 0; position: relative;">
        View and manage materials organized by property or site location
      </p>
    </div>
    
    <div id="propertiesContainer">
      <div class="text-center py-5">
        <div class="spinner-border text-primary"></div>
        <p class="mt-2 text-muted">Loading properties...</p>
      </div>
    </div>
  </div>
  
  <!-- Add Property Modal -->
  <div class="modal fade" id="addPropertyModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content" style="border-radius: 16px;">
        <div class="modal-header" style="background: linear-gradient(135deg, var(--green), var(--green-dark)); color: white; border: none; border-radius: 16px 16px 0 0;">
          <h5 class="modal-title" style="font-weight: 600;">Add New Property</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label" style="font-weight: 600;">Property Name *</label>
            <input type="text" class="form-control" id="propertyName" placeholder="e.g., Tower A, Villa 12, Site B">
          </div>
          <div class="mb-3">
            <label class="form-label" style="font-weight: 600;">Address</label>
            <input type="text" class="form-control" id="propertyAddress" placeholder="Full address (optional)">
          </div>
          <div class="mb-3">
            <label class="form-label" style="font-weight: 600;">Description</label>
            <textarea class="form-control" id="propertyDescription" rows="2" placeholder="Brief description (optional)"></textarea>
          </div>
        </div>
        <div class="modal-footer" style="border: none;">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn" style="background: var(--green); color: white;" onclick="addProperty()">Add Property</button>
        </div>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = localStorage.getItem('access_token');
    
    const propertyColors = [
      'linear-gradient(135deg, #6366f1, #4f46e5)',
      'linear-gradient(135deg, #ec4899, #be185d)',
      'linear-gradient(135deg, #f59e0b, #d97706)',
      'linear-gradient(135deg, #3b82f6, #1d4ed8)',
      'linear-gradient(135deg, #8b5cf6, #6d28d9)',
      'linear-gradient(135deg, #14b8a6, #0d9488)',
      'linear-gradient(135deg, #f43f5e, #e11d48)'
    ];
    
    const propertyIcons = ['🏢', '🏠', '🏗️', '🏭', '🏛️', '🏨', '🏪'];
    
    async function loadProperties() {
      try {
        const response = await fetch('/procurement/api/properties', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        
        const container = document.getElementById('propertiesContainer');
        
        if (data.properties && data.properties.length > 0) {
          // Sort: Unassigned last, then by material count
          const sorted = data.properties.sort((a, b) => {
            if (a.name === 'Unassigned') return 1;
            if (b.name === 'Unassigned') return -1;
            return b.materials_count - a.materials_count;
          });
          
          let html = '<div class="properties-grid">';
          
          sorted.forEach((prop, idx) => {
            const isUnassigned = prop.name === 'Unassigned';
            const color = isUnassigned ? 'linear-gradient(135deg, #94a3b8, #64748b)' : propertyColors[idx % propertyColors.length];
            const icon = isUnassigned ? '📦' : propertyIcons[idx % propertyIcons.length];
            
            html += `
              <a href="/procurement/property/${encodeURIComponent(prop.name)}" class="property-card">
                <div class="property-header ${isUnassigned ? 'unassigned' : ''}" style="background: ${color};">
                  <div class="property-icon">${icon}</div>
                  <h3 class="property-name">${prop.name}</h3>
                </div>
                <div class="property-body">
                  <div class="property-stats">
                    <div>
                      <div class="property-stat-value">${prop.materials_count}</div>
                      <div class="property-stat-label">Materials</div>
                    </div>
                    <div>
                      <div class="property-stat-value">${Math.round(prop.total_quantity).toLocaleString()}</div>
                      <div class="property-stat-label">Items</div>
                    </div>
                    <div>
                      <div class="property-stat-value">${(prop.total_value / 1000).toFixed(1)}K</div>
                      <div class="property-stat-label">Value (AED)</div>
                    </div>
                  </div>
                </div>
                <div class="property-footer">
                  <span style="color: #64748b; font-size: 0.85rem;">${isUnassigned ? 'Needs assignment' : 'Click to view'}</span>
                  <span class="btn-view">
                    View
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                  </span>
                </div>
              </a>
            `;
          });
          
          // Add "Add Property" card
          html += `
            <div class="add-property-card" onclick="showAddPropertyModal()">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
              </svg>
              <h5>Add New Property</h5>
            </div>
          `;
          
          html += '</div>';
          container.innerHTML = html;
        } else {
          container.innerHTML = `
            <div class="empty-state">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
              </svg>
              <h4>No Properties Yet</h4>
              <p class="text-muted mb-4">Create your first property to organize materials by location</p>
              <button class="btn" style="background: var(--green); color: white;" onclick="showAddPropertyModal()">
                Add First Property
              </button>
            </div>
          `;
        }
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('propertiesContainer').innerHTML = '<div class="alert alert-danger">Error loading properties</div>';
      }
    }
    
    function showAddPropertyModal() {
      const modal = new bootstrap.Modal(document.getElementById('addPropertyModal'));
      modal.show();
    }
    
    async function addProperty() {
      const name = document.getElementById('propertyName').value.trim();
      const address = document.getElementById('propertyAddress').value.trim();
      const description = document.getElementById('propertyDescription').value.trim();
      
      if (!name) {
        alert('Property name is required');
        return;
      }
      
      try {
        const response = await fetch('/procurement/api/properties', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ name, address, description })
        });
        
        const result = await response.json();
        if (result.success) {
          alert('Property added successfully!');
          bootstrap.Modal.getInstance(document.getElementById('addPropertyModal')).hide();
          document.getElementById('propertyName').value = '';
          document.getElementById('propertyAddress').value = '';
          document.getElementById('propertyDescription').value = '';
          loadProperties();
        } else {
          alert('Error: ' + result.error);
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }
    
    loadProperties();
  </script>
</body>
</html>
