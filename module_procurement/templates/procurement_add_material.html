<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>Add Material - Procurement Module</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/animations.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/mobile_responsive.css">
  <style>
    :root { --primary: #125435; --purple: #7c3aed; }
    body { background: #f1f5f9; }
    .form-container { max-width: 700px; margin: 0 auto; }
    .form-card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .form-header { background: linear-gradient(135deg, var(--purple), #5b21b6); color: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; }
    .form-label { font-weight: 600; color: #374151; margin-bottom: 0.5rem; }
    .form-control, .form-select { border: 1px solid #d1d5db; border-radius: 8px; padding: 0.75rem; }
    .form-control:focus, .form-select:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
    .btn-submit { background: linear-gradient(135deg, var(--purple), #5b21b6); color: white; border: none; padding: 0.875rem 2rem; border-radius: 8px; font-weight: 600; }
    .btn-submit:hover { color: white; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(124,58,237,0.3); }
    .back-link { color: var(--primary); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
    .total-display { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 8px; padding: 0.75rem; font-weight: 700; color: var(--primary); text-align: center; font-size: 1.25rem; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="form-container">
      <a href="/procurement/" class="back-link">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Back to Procurement
      </a>
      
      <div class="form-card">
        <div class="form-header">
          <h1 style="font-size: 1.5rem; font-weight: 700; margin: 0;">Add New Material</h1>
          <p style="margin: 0.5rem 0 0; opacity: 0.9;">Add a material to the procurement list</p>
        </div>
        
        <form id="materialForm">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label">Material Name *</label>
              <input type="text" class="form-control" name="material_name" required placeholder="e.g., PVC Pipe 4 inch">
            </div>
            <div class="col-md-4">
              <label class="form-label">Category</label>
              <select class="form-select" name="category">
                <option value="General">General</option>
                <option value="Electrical">Electrical</option>
                <option value="Plumbing">Plumbing</option>
                <option value="HVAC/MEP">HVAC/MEP</option>
                <option value="Cleaning">Cleaning</option>
                <option value="Safety">Safety</option>
                <option value="Tools">Tools</option>
                <option value="Office">Office Supplies</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Property / Site</label>
              <select class="form-select" name="property" id="propertySelect">
                <option value="Unassigned">-- Unassigned (Master Inventory) --</option>
              </select>
              <small class="text-muted">Assign this material to a specific property or leave as unassigned</small>
            </div>
            <div class="col-12">
              <label class="form-label">Description</label>
              <input type="text" class="form-control" name="description" placeholder="Brief description of the material">
            </div>
            <div class="col-md-4">
              <label class="form-label">Quantity *</label>
              <input type="number" class="form-control" name="quantity" id="quantity" required min="0" step="0.01" value="1" oninput="calculateTotal()">
            </div>
            <div class="col-md-4">
              <label class="form-label">Unit</label>
              <select class="form-select" name="unit">
                <option value="pcs">Pieces (pcs)</option>
                <option value="kg">Kilograms (kg)</option>
                <option value="m">Meters (m)</option>
                <option value="sqm">Square Meters (sqm)</option>
                <option value="ltr">Liters (ltr)</option>
                <option value="box">Box</option>
                <option value="roll">Roll</option>
                <option value="set">Set</option>
                <option value="bag">Bag</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Unit Price (AED) *</label>
              <input type="number" class="form-control" name="unit_price" id="unit_price" required min="0" step="0.01" value="0" oninput="calculateTotal()">
            </div>
            <div class="col-12">
              <label class="form-label">Total Price (AED)</label>
              <div class="total-display" id="totalPrice">AED 0.00</div>
            </div>
            <div class="col-12">
              <label class="form-label">Supplier</label>
              <input type="text" class="form-control" name="supplier" placeholder="Supplier/Vendor name">
            </div>
            <div class="col-12">
              <label class="form-label">Notes</label>
              <textarea class="form-control" name="notes" rows="2" placeholder="Any additional notes"></textarea>
            </div>
            <div class="col-12 mt-4">
              <button type="submit" class="btn-submit w-100">Add Material</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
  
  <script>
    const token = localStorage.getItem('access_token');
    
    // Load properties on page load
    async function loadProperties() {
      try {
        const response = await fetch('/procurement/api/registered-properties', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        
        const select = document.getElementById('propertySelect');
        if (data.properties && data.properties.length > 0) {
          data.properties.forEach(p => {
            const option = document.createElement('option');
            option.value = p.name;
            option.textContent = p.name;
            select.appendChild(option);
          });
        }
      } catch (error) {
        console.error('Error loading properties:', error);
      }
    }
    
    loadProperties();
    
    function calculateTotal() {
      const qty = parseFloat(document.getElementById('quantity').value) || 0;
      const price = parseFloat(document.getElementById('unit_price').value) || 0;
      const total = qty * price;
      document.getElementById('totalPrice').textContent = `AED ${total.toFixed(2)}`;
    }
    
    document.getElementById('materialForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      
      try {
        const token = localStorage.getItem('access_token');
        const response = await fetch('/procurement/api/materials', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(data)
        });
        
        const result = await response.json();
        if (result.success) {
          alert('Material added successfully!');
          window.location.href = '/procurement/materials';
        } else {
          alert('Error: ' + result.error);
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    });
  </script>
</body>
</html>
