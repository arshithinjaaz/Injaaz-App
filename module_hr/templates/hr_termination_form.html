<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Termination Form - HR Module</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/animations.css">
  <link rel="stylesheet" href="/static/css/hr-forms.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/mobile_responsive.css">
  <style>
    :root { --primary: #125435; --primary-light: #1a7a4c; }
    .form-container { max-width: 800px; margin: 0 auto; }
    .form-card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .form-header { background: linear-gradient(135deg, #0d9488 0%, #0f766e 50%, #134e4a 100%); color: white; padding: 1.5rem 1.75rem; border-radius: 16px; margin-bottom: 1.5rem; box-shadow: 0 4px 14px rgba(13, 148, 136, 0.25); }
    .form-label { font-weight: 600; color: #374151; margin-bottom: 0.5rem; }
    .form-control, .form-select { border: 1px solid #d1d5db; border-radius: 8px; padding: 0.75rem; }
    .form-control:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(18,84,53,0.1); }
    .btn-submit { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; border: none; padding: 0.875rem 2rem; border-radius: 8px; font-weight: 600; }
    .btn-submit:hover { color: white; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(18,84,53,0.3); }
    .back-link { color: var(--primary); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; color: #1e293b; margin: 1.5rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid #e5e7eb; }
    .form-check-label { font-weight: 500; }
    
    .success-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,23,42,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; visibility: hidden; transition: opacity 0.2s, visibility 0.2s; }
    .success-overlay.show { opacity: 1; visibility: visible; }
    .container { padding-top: 5.5rem; }
  </style>
</head>
<body class="hr-form-page">
  {% set active_page = 'hr' %}
  {% include 'partials/main_navbar.html' with context %}

  <div class="success-overlay" id="successModal">
    <div class="success-modal">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#10b981,#059669);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;"><svg width="32" height="32" fill="none" stroke="white" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg></div>
      <h2 style="font-size:1.35rem;font-weight:700;color:#1e293b;">Form Submitted!</h2>
      <p class="text-muted" style="margin:0.5rem 0;">Your termination form has been sent to HR for review.</p>
      <div id="submissionId" style="background:#f1f5f9;padding:0.5rem 1rem;border-radius:8px;font-family:monospace;font-size:0.85rem;margin:1rem 0;"></div>
      <button class="btn hr-form-submit" onclick="goToMyRequests()">View My Requests</button>
    </div>
  </div>

  <div class="container py-4">
    <div class="form-container">
      <a href="/hr/" class="back-link">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Back to HR Module
      </a>
      
      <div class="form-card">
        <div class="form-header">
          <h1 style="font-size: 1.5rem; font-weight: 700; margin: 0;">Employee Termination Form</h1>
          <p style="margin: 0.5rem 0 0; opacity: 0.9;">Process employee exit and clearance</p>
        </div>
        
        <form id="terminationForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Employee Name *</label>
              <input type="text" class="form-control" name="employee_name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Employee ID *</label>
              <input type="text" class="form-control" name="employee_id" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Department *</label>
              <select class="form-select" name="department" required>
                <option value="">Select Department</option>
                <option value="operations">Operations</option>
                <option value="hr">Human Resources</option>
                <option value="finance">Finance</option>
                <option value="procurement">Procurement</option>
                <option value="business_development">Business Development</option>
                <option value="maintenance">Maintenance</option>
                <option value="cleaning">Cleaning</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Position/Title *</label>
              <input type="text" class="form-control" name="position" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Date of Joining</label>
              <input type="date" class="form-control" name="join_date">
            </div>
            <div class="col-md-6">
              <label class="form-label">Last Working Day *</label>
              <input type="date" class="form-control" name="last_working_day" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Termination Type *</label>
              <select class="form-select" name="termination_type" required>
                <option value="">Select Type</option>
                <option value="resignation">Resignation</option>
                <option value="termination">Termination</option>
                <option value="contract_end">Contract End</option>
                <option value="retirement">Retirement</option>
                <option value="mutual_agreement">Mutual Agreement</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Notice Period Served</label>
              <select class="form-select" name="notice_served">
                <option value="yes">Yes - Full Notice</option>
                <option value="partial">Partial Notice</option>
                <option value="no">No Notice</option>
                <option value="waived">Notice Waived</option>
              </select>
            </div>
            
            <div class="col-12">
              <h5 class="section-title">Clearance Checklist</h5>
            </div>
            
            <div class="col-md-6">
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="clearance_id_card" id="idCard">
                <label class="form-check-label" for="idCard">ID Card Returned</label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="clearance_laptop" id="laptop">
                <label class="form-check-label" for="laptop">Laptop/Computer Returned</label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="clearance_phone" id="phone">
                <label class="form-check-label" for="phone">Company Phone Returned</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="clearance_keys" id="keys">
                <label class="form-check-label" for="keys">Keys Returned</label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="clearance_documents" id="documents">
                <label class="form-check-label" for="documents">Documents Handed Over</label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="clearance_accounts" id="accounts">
                <label class="form-check-label" for="accounts">System Accounts Deactivated</label>
              </div>
            </div>
            
            <div class="col-12">
              <label class="form-label">Reason for Termination *</label>
              <textarea class="form-control" name="reason" rows="3" required></textarea>
            </div>
            <div class="col-12">
              <label class="form-label">Exit Interview Notes</label>
              <textarea class="form-control" name="exit_notes" rows="3" placeholder="Summary of exit interview (if conducted)"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label">Final Settlement Notes</label>
              <textarea class="form-control" name="settlement_notes" rows="2" placeholder="Any notes regarding final settlement"></textarea>
            </div>
            
            <div class="col-12 mt-4">
              <button type="submit" class="btn-submit w-100">Submit Termination Form</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
  
  <script>
    document.getElementById('terminationForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      
      // Handle checkboxes
      ['clearance_id_card', 'clearance_laptop', 'clearance_phone', 'clearance_keys', 'clearance_documents', 'clearance_accounts'].forEach(field => {
        data[field] = document.querySelector(`[name="${field}"]`).checked;
      });
      
      data.form_type = 'termination';
      
      try {
        const token = localStorage.getItem('access_token');
        const response = await fetch('/hr/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(data)
        });
        
        const result = await response.json();
        if (result.success) {
          showSuccessModal(result.submission_id);
        } else {
          showErrorMessage('Error: ' + result.error);
        }
      } catch (error) {
        showErrorMessage('Error: ' + error.message);
      }
    });
    
    function showSuccessModal(submissionId) {
      document.getElementById('submissionId').textContent = submissionId;
      document.getElementById('successModal').classList.add('show');
    }
    function goToMyRequests() { window.location.href = '/hr/my-requests'; }
    function showErrorMessage(message) {
      const toast = document.createElement('div');
      toast.style.cssText = 'position: fixed; top: 20px; right: 20px; background: #fee2e2; color: #dc2626; padding: 1rem 1.5rem; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 9999; font-weight: 500;';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 5000);
    }
  </script>
  <script src="{{ url_for('static', filename='api-client.js') }}"></script>
  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
