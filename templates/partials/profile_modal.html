{#
  Profile Modal Component
  
  Usage:
    {% include 'partials/profile_modal.html' %}
  
  Requires:
    - closeProfileModal() JavaScript function
    - loadProfileData() JavaScript function
    - SignaturePad library for signature functionality
#}

<div id="profileModal" class="contact-modal">
  <div class="contact-modal-content profile-modal-container" style="opacity:1;visibility:visible;background:#fff;transform:translateY(0);">
    <button class="contact-modal-close" onclick="closeProfileModal()" aria-label="Close" style="position: absolute; top: 1rem; right: 1rem; z-index: 10; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 1.5rem; display: flex; align-items: center; justify-content: center;">×</button>
    <div id="profileContent" style="padding: 0;">
      <div style="text-align: center; padding: 2rem;">
        <div class="spinner" style="border: 4px solid rgba(18, 84, 53, 0.1); border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
        <p style="margin-top: 1rem; color: var(--text-light);">Loading profile...</p>
      </div>
    </div>
  </div>
</div>
