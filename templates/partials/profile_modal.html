{#
  Profile Modal Component
  
  Usage:
    {% include 'partials/profile_modal.html' %}
  
  Requires:
    - closeProfileModal() JavaScript function
    - loadProfileData() JavaScript function
    - SignaturePad library for signature functionality
#}

<div id="profileModal" class="contact-modal">
  <div class="contact-modal-content">
    <div class="contact-modal-header">
      <h2>My Profile</h2>
      <button class="contact-modal-close" onclick="closeProfileModal()" aria-label="Close">×</button>
    </div>
    <div class="contact-modal-info" id="profileContent">
      <div style="text-align: center; padding: 2rem;">
        <div class="spinner" style="border: 4px solid rgba(18, 84, 53, 0.1); border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
        <p style="margin-top: 1rem; color: var(--text-light);">Loading profile...</p>
      </div>
    </div>
  </div>
</div>
