{# Global nav to-do — floating panel (no overlay); todo_list.js + dashboard.css #}
<div id="todoPanel" class="todo-panel-pop" aria-hidden="true" role="region" aria-labelledby="todoPanelTitle">
  <div class="todo-panel-inner">
    <div class="todo-panel-head">
      <h2 id="todoPanelTitle" class="todo-panel-title">To-do</h2>
      <span class="todo-panel-sub">Saved in this browser</span>
    </div>
    <div class="todo-panel-body">
      <div class="todo-composer">
        <div class="todo-input-row">
          <input type="text" id="todoNewInput" class="todo-new-input" placeholder="Add a task…" maxlength="500" autocomplete="off"/>
          <button type="button" class="todo-add-btn" id="todoAddBtn">Add</button>
        </div>
        <div class="todo-remind-row">
          <label class="todo-remind-label" for="todoRemindInput">Reminder</label>
          <input type="datetime-local" id="todoRemindInput" class="todo-remind-input" title="Optional date and time"/>
        </div>
      </div>
      <ul class="todo-list" id="todoList" aria-live="polite"></ul>
      <div class="todo-modal-actions">
        <button type="button" class="todo-clear-done" id="todoClearDone">Clear completed</button>
      </div>
    </div>
  </div>
</div>
