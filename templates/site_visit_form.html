<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Site Visit — Submit</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='animations.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='mobile_responsive.css') }}">
  <style>
    body {
      font-family: system-ui, Arial;
      margin: 24px auto;
      max-width: 900px;
      padding: 0 16px;
      box-sizing: border-box;
    }
    .item {
      border: 1px solid #ddd;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 10px;
      background: #fff;
    }
    fieldset {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }
    label { display:block; margin-top:8px; font-weight:600; }
    input[type="text"], input[type="email"], textarea {
      width:100%;
      padding:10px 12px;
      margin-top:6px;
      box-sizing:border-box;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
    }
    button {
      margin-top:10px;
      padding:10px 14px;
      min-height: 44px;
      border: none;
      border-radius: 10px;
      background: #125435;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .small { font-size:0.9em; color:#666; }
    .thumb { height:80px; margin-right:8px; }
    .images { display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap; }
    .status { margin-top:12px; color:#0a5; }
    .error { margin-top:12px; color:#c33; }
    @media (max-width: 768px) {
      body { margin: 14px auto; padding: 0 12px; }
      h1 { font-size: 1.35rem; margin-bottom: 10px; }
      fieldset { padding: 10px; }
      button { width: 100%; }
      .images .thumb { height: 64px; }
    }
  </style>
</head>
<body>
  <h1>Submit Site Visit</h1>

  <form id="visit-form">
    <fieldset>
      <legend>Visit Info</legend>
      <label>Building name
        <input type="text" id="building_name" name="building_name" required />
      </label>
      <label>Email:
        <input type="email" id="email" name="email" required />
      </label>
      <label>Address:
        <input type="text" id="building_address" name="building_address" />
      </label>
    </fieldset>

    <fieldset style="margin-top:16px;">
      <legend>Report items</legend>
      <div id="items"></div>

      <button id="add-item" type="button">+ Add item</button>
      <p class="small">Each item can include uploaded photos. Photos are uploaded directly to Cloudinary using the unsigned preset.</p>
    </fieldset>

    <fieldset style="margin-top:16px;">
      <legend>Signatures (optional)</legend>
      <label>Inspector name
        <input type="text" id="inspector_name" />
      </label>
    </fieldset>

    <div style="margin-top:14px;">
      <button id="submit-btn" type="submit">Submit metadata</button>
      <button id="finalize-btn" type="button" disabled>Finalize (enqueue report)</button>
    </div>

    <div id="feedback" aria-live="polite"></div>
  </form>

  <script>
    // Cloudinary variables injected from server-side rendering
    window.CLOUDINARY_CLOUD_NAME = "{{ cloud_name|e }}";
    window.CLOUDINARY_UPLOAD_PRESET = "{{ upload_preset|e }}";
  </script>

  <script src="/static/site_form.js"></script>
</body>
</html>
