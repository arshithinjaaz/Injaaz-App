<!DOCTYPE html>
<html lang="en" class="login-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Login | Injaaz Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='mobile_responsive.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='animations.css') }}">
    <style>
        :root {
            --lp-primary: #003b22;
            --lp-primary-container: #125435;
            --lp-on-primary: #ffffff;
            --lp-on-primary-container: #87c79f;
            --lp-primary-fixed-dim: #95d5ac;
            --lp-surface: #f7faf8;
            --lp-surface-lowest: #ffffff;
            --lp-surface-highest: #e0e3e1;
            --lp-surface-high: #e6e9e7;
            --lp-on-surface: #181c1b;
            --lp-on-surface-variant: #404942;
            --lp-outline: #707972;
            --lp-outline-variant: #c0c9c0;
            --lp-error: #ba1a1a;
            --lp-error-bg: #ffdad6;
            --lp-success-bg: #d1fae5;
            --lp-success-text: #065f46;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 1.25rem;
            line-height: 1;
        }

        /* One viewport, no page scroll (clip if content exceeds very short screens) */
        html.login-root {
            height: 100%;
            max-height: 100%;
            overflow: hidden;
            box-sizing: border-box;
        }

        html.login-root body.login-page {
            height: 100%;
            max-height: 100%;
        }

        body.login-page {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--lp-on-surface);
            background: var(--lp-surface);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
            padding-top: env(safe-area-inset-top, 0);
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        @supports (height: 100dvh) {
            html.login-root {
                height: 100dvh;
                max-height: 100dvh;
            }
        }

        .login-main {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .login-main {
                flex-direction: row;
            }
        }

        .login-hero {
            width: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem 2.5rem;
            background: linear-gradient(135deg, var(--lp-primary) 0%, var(--lp-primary-container) 100%);
            flex: 0 1 auto;
            min-height: 0;
        }

        @media (max-width: 767px) {
            .login-main {
                overflow: visible;
                position: relative;
            }
            .login-hero {
                flex: 0 0 auto;
                min-height: 45vh;
                max-height: 50vh;
                padding: 2rem 1.5rem 4.5rem;
            }
        }

        @media (min-width: 768px) {
            .login-hero {
                width: 55%;
                flex: 0 0 55%;
                max-width: none;
                align-self: stretch;
                padding: 2rem 2rem 2rem 3rem;
            }
        }

        .login-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(var(--lp-on-primary-container) 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.1;
            pointer-events: none;
        }

        .login-hero::after {
            content: '';
            position: absolute;
            bottom: -6rem;
            left: -6rem;
            width: 24rem;
            height: 24rem;
            border-radius: 50%;
            background: var(--lp-primary-fixed-dim);
            opacity: 0.05;
            filter: blur(48px);
            pointer-events: none;
        }

        .login-hero-inner {
            position: relative;
            z-index: 1;
            max-width: 22rem;
        }

        .login-hero-kicker {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--lp-on-primary-container);
            margin: 0 0 1rem;
        }

        .login-hero-title {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: clamp(1.85rem, 5vw, 3.25rem);
            line-height: 1.1;
            color: var(--lp-on-primary);
            margin: 0 0 1.25rem;
        }

        .login-hero-title span {
            color: var(--lp-primary-fixed-dim);
        }

        .login-hero-lede {
            margin: 0;
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            max-width: 20rem;
        }

        @media (min-width: 768px) {
            .login-hero-lede {
                font-size: 1.125rem;
            }
        }

        .login-canvas {
            flex: 1 1 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem 1.25rem 1.5rem;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .login-canvas {
                width: 45%;
                flex: 0 0 45%;
                padding: 2rem 1.5rem;
                min-width: 0;
                align-self: stretch;
            }
        }

        .login-card {
            width: 100%;
            max-width: 28rem;
            max-height: 100%;
            background: var(--lp-surface-lowest);
            border-radius: 0.75rem;
            padding: 1.5rem 1.5rem;
            box-shadow: 0 12px 40px rgba(0, 59, 34, 0.06);
            border: 1px solid rgba(192, 201, 192, 0.35);
            box-sizing: border-box;
            overflow: hidden;
        }

        @media (max-width: 767px) {
            .login-canvas {
                margin-top: -2.5rem;
                position: relative;
                z-index: 10;
                background: white;
                border-radius: 22px 22px 0 0;
                padding: 1.75rem 1.5rem 2rem;
                align-items: center;
                justify-content: center;
                overflow-y: auto;
                box-shadow: 0 -4px 24px rgba(0,0,0,0.08);
            }
            .login-card {
                max-width: 100%;
                width: 100%;
                padding: 0;
                border-radius: 0;
                box-shadow: none;
                border: none;
                background: transparent;
            }
            .login-card-logo {
                margin-bottom: 0.5rem;
            }
            .login-card-logo img {
                width: 36px;
                height: 36px;
                border-radius: 8px;
            }
            .login-card-intro {
                margin-bottom: 0.6rem;
            }
            .login-card-intro h1 {
                font-size: 0.95rem;
                margin-bottom: 0.1rem;
            }
            .login-card-intro .subtitle {
                font-size: 0.68rem;
                line-height: 1.35;
            }
            .lp-label {
                font-size: 0.58rem;
                margin-bottom: 0.15rem;
            }
            .form-group {
                margin-bottom: 0.45rem;
            }
            input.lp-input[type="text"],
            input.lp-input[type="password"] {
                padding: 0.45rem 0.65rem 0.45rem 2rem;
                font-size: 0.78rem;
                border-radius: 0.35rem;
            }
            .lp-input-icon {
                left: 0.55rem;
            }
            .lp-input-icon svg {
                width: 13px;
                height: 13px;
            }
            .btn-login {
                padding: 0.55rem 1rem;
                font-size: 0.78rem;
                margin-top: 0.15rem;
                border-radius: 0.35rem;
            }
            .register-link {
                font-size: 0.68rem;
                margin-top: 0.6rem;
            }
        }

        @media (min-width: 768px) {
            .login-card {
                padding: 1.75rem 2rem;
                margin-top: 0;
            }
        }

        .login-card-logo {
            text-align: left;
            margin-bottom: 0.75rem;
        }

        .login-card-logo img {
            width: 56px;
            height: 56px;
            border-radius: 11px;
        }

        .login-card-intro {
            margin-bottom: 1rem;
        }

        .login-card-intro h1 {
            font-family: 'Manrope', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--lp-primary);
            margin: 0 0 0.2rem;
            text-align: left;
        }

        .login-card-intro .subtitle {
            margin: 0;
            font-size: 0.775rem;
            color: var(--lp-on-surface-variant);
            line-height: 1.4;
            text-align: left;
        }

        .error-message {
            background: var(--lp-error-bg);
            color: #93000a;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.25rem;
            display: none;
            font-size: 0.875rem;
            line-height: 1.4;
        }

        .success-message {
            background: var(--lp-success-bg);
            color: var(--lp-success-text);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.25rem;
            display: none;
            font-size: 0.875rem;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 0.875rem;
        }

        .lp-label {
            display: block;
            margin-bottom: 0.25rem;
            font-size: 0.625rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--lp-outline);
        }

        .lp-input-wrap {
            position: relative;
        }

        .lp-input-wrap:focus-within .lp-input-icon {
            color: var(--lp-primary);
        }

        .lp-input-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--lp-outline);
            pointer-events: none;
            transition: color 0.2s;
        }

        input.lp-input[type="text"],
        input.lp-input[type="password"] {
            width: 100%;
            padding: 0.65rem 0.875rem 0.65rem 2.5rem;
            border: none;
            border-radius: 0.45rem;
            font-size: 0.875rem;
            font-family: inherit;
            background: var(--lp-surface-highest);
            color: var(--lp-on-surface);
            box-sizing: border-box;
            transition: box-shadow 0.2s, background 0.2s;
        }

        input.lp-input::placeholder {
            color: rgba(112, 121, 114, 0.55);
        }

        input.lp-input:focus {
            outline: none;
            background: var(--lp-surface-lowest);
            box-shadow: 0 0 0 2px var(--lp-primary-fixed-dim);
        }

        .btn-login {
            width: 100%;
            padding: 0.7rem 1.25rem;
            margin-top: 0.35rem;
            background: var(--lp-primary-container);
            color: var(--lp-on-primary);
            border: none;
            border-radius: 0.45rem;
            font-size: 0.875rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.1);
            transition: opacity 0.2s, transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-login:hover {
            opacity: 0.92;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login:disabled {
            background: #c0c9c0;
            cursor: not-allowed;
            opacity: 1;
            box-shadow: none;
        }

        .btn-login .material-symbols-outlined {
            font-size: 1.125rem;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 0.75rem;
            color: var(--lp-primary-container);
            font-size: 0.875rem;
        }

        .register-link {
            text-align: center;
            margin-top: 1.75rem;
            color: var(--lp-on-surface-variant);
            font-size: 0.875rem;
        }

        .register-link a {
            color: var(--lp-primary);
            text-decoration: none;
            font-weight: 700;
        }

        .register-link a:hover {
            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-color: var(--lp-primary-fixed-dim);
        }

        @media (max-width: 767px) {
            html.login-root,
            body.login-page {
                overflow: hidden !important;
                overflow-x: hidden !important;
                overflow-y: hidden !important;
            }

            body.login-page {
                background: var(--lp-surface) !important;
            }

            input.lp-input[type="text"],
            input.lp-input[type="password"] {
                font-size: 16px;
            }

            .btn-login {
                min-height: 48px;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                border-radius: 0;
                border-left: none;
                border-right: none;
                box-shadow: none;
            }

            .login-canvas {
                padding-left: max(1rem, env(safe-area-inset-left));
                padding-right: max(1rem, env(safe-area-inset-right));
            }
        }

        /* Beat global mobile_responsive.css input rules on this page */
        @media (max-width: 768px) {
            body.login-page input.lp-input[type="text"],
            body.login-page input.lp-input[type="password"] {
                border: none !important;
                box-shadow: none !important;
            }

            body.login-page input.lp-input[type="text"]:focus,
            body.login-page input.lp-input[type="password"]:focus {
                box-shadow: 0 0 0 2px var(--lp-primary-fixed-dim) !important;
            }
        }

        /* Override shared mobile_responsive.css body overflow on this route */
        html.login-root,
        body.login-page {
            overflow: hidden !important;
        }
    </style>
</head>
<body class="login-page">
    <main class="login-main">
        <section class="login-hero" aria-hidden="true">
            <div class="login-hero-inner">
                <p class="login-hero-kicker">Injaaz Platform</p>
                <h2 class="login-hero-title">All Operations.<br><span>One Platform.</span></h2>
                <p class="login-hero-lede">The hub for your teams to run logistics, facilities, and day-to-day operations in one place.</p>
            </div>
        </section>

        <section class="login-canvas">
            <div class="login-card">
                <div class="login-card-logo logo">
                    <img src="{{ url_for('static', filename='icons/icon-192x192.png') }}" alt="Injaaz Logo">
                </div>

                <div class="login-card-intro">
                    <h1>Welcome back</h1>
                    <p class="subtitle">Sign in to open your dashboard and continue where you left off.</p>
                </div>

                <div id="error-message" class="error-message"></div>
                <div id="success-message" class="success-message"></div>

                <form id="login-form">
                    <div class="form-group">
                        <label class="lp-label" for="username">Username or email</label>
                        <div class="lp-input-wrap">
                            <span class="material-symbols-outlined lp-input-icon" aria-hidden="true">mail</span>
                            <input class="lp-input" type="text" id="username" name="username" required autocomplete="username" placeholder="you@company.com">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="lp-label" for="password">Password</label>
                        <div class="lp-input-wrap">
                            <span class="material-symbols-outlined lp-input-icon" aria-hidden="true">lock</span>
                            <input class="lp-input" type="password" id="password" name="password" required autocomplete="off" data-1p-ignore="true" data-lpignore="true" placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" class="btn-login" id="login-btn">
                        <span>Sign in to dashboard</span>
                        <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
                    </button>
                    <div class="loading" id="loading">Signing in...</div>
                </form>

                <div class="register-link">
                    Don't have an account? <a href="{{ url_for('register_page') }}">Sign up</a>
                </div>
            </div>
        </section>
    </main>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // Show loading
            loginBtn.disabled = true;
            loading.style.display = 'block';
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            console.log('Login attempt:', { username, passwordLength: password.length });
            
            const requestBody = JSON.stringify({ username, password });
            console.log('Request body:', requestBody);
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: requestBody
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);
                
                // Check if response is JSON
                const contentType = response.headers.get('content-type');
                console.log('Content-Type:', contentType);
                
                if (!contentType || !contentType.includes('application/json')) {
                    const text = await response.text();
                    console.error('Non-JSON response:', text.substring(0, 500));
                    errorMessage.textContent = 'Server error: Expected JSON response. Check console for details.';
                    errorMessage.style.display = 'block';
                    loginBtn.disabled = false;
                    loading.style.display = 'none';
                    return;
                }
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok) {
                    // Store tokens
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Show success
                    successMessage.textContent = 'Login successful! Redirecting...';
                    successMessage.style.display = 'block';
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    errorMessage.textContent = data.error || 'Login failed';
                    errorMessage.style.display = 'block';
                    loginBtn.disabled = false;
                    loading.style.display = 'none';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Network error. Please check if the server is running on http://localhost:5000';
                errorMessage.style.display = 'block';
                loginBtn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>
    <script src="{{ url_for('static', filename='mobile_utils.js') }}" defer></script>
</body>
</html>
