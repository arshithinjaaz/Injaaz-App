<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
  <title>{{ schema.title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='animations.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='mobile_responsive.css') }}">
  <style>
    body{
      font-family:system-ui,Arial;
      margin:24px auto;
      max-width:900px;
      padding:0 16px;
      box-sizing:border-box;
    }
    h1 { margin-bottom: 8px; }
    label{display:block;margin-top:10px;font-weight:600}
    input[type=text],input[type=email],textarea,input[type=file]{
      width:100%;
      padding:10px 12px;
      margin-top:6px;
      box-sizing:border-box;
      border:1px solid #d1d5db;
      border-radius:10px;
      font-size:16px;
      font-family:inherit;
    }
    textarea { min-height: 110px; resize: vertical; }
    button[type=submit]{
      margin-top:14px;
      padding:11px 16px;
      border:none;
      border-radius:10px;
      background:#125435;
      color:#fff;
      font-weight:600;
      font-size:16px;
      cursor:pointer;
      min-height:44px;
    }
    .small{font-size:0.9em;color:#666;line-height:1.4}
    @media (max-width: 768px) {
      body { margin: 14px auto; padding: 0 12px; }
      h1 { font-size: 1.35rem; }
      button[type=submit] { width: 100%; }
    }
  </style>
</head>
<body>
  <h1>{{ schema.title }}</h1>
  <p class="small">{{ schema.description }}</p>

  <form id="main-form" action="{{ url_for('forms.submit_form', form_name=form_name) }}" method="post" enctype="multipart/form-data">
    {% for field in schema.fields %}
      <label>{{ field.label }}
        {% if field.type == 'textarea' %}
          <textarea name="{{ field.name }}" {% if field.required %} required {% endif %}></textarea>
        {% else %}
          <input type="{{ field.type }}" name="{{ field.name }}" {% if field.required %} required {% endif %} />
        {% endif %}
      </label>
    {% endfor %}

    {% if schema.allow_photos %}
      <label>Photos
        <input type="file" name="photos" accept="image/*" multiple />
      </label>
      <div class="small">Upload photos to assist the report (max 15MB per file).</div>
    {% endif %}

    <button type="submit">Submit</button>
  </form>

  <div id="result" style="margin-top:18px;"></div>

  <script>
    // Graceful client-side UX: intercept submit to show simple feedback
    const form = document.getElementById('main-form');
    const result = document.getElementById('result');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      result.textContent = 'Submitting...';
      const fd = new FormData(form);
      try {
        const resp = await fetch(form.action, { method: 'POST', body: fd });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || JSON.stringify(data));
        result.innerHTML = `<div>Submitted. visit_id: ${data.visit_id}. Job queued. Check status at <a href="${data.status_url}">${data.status_url}</a></div>`;
      } catch (err) {
        result.innerHTML = `<div style="color:crimson;">Submit failed: ${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
